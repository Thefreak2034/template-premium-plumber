<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="bf-brass" x1="50" y1="40" x2="110" y2="90" gradientUnits="userSpaceOnUse">
                <stop stop-color="#fbbf24"/><stop offset=".5" stop-color="#f59e0b"/><stop offset="1" stop-color="#92400e"/>
            </linearGradient>
        </defs>
        <!-- Outdoor wall background -->
        <rect x="10" y="10" width="140" height="100" fill="rgba(40,40,40,.5)"/>
