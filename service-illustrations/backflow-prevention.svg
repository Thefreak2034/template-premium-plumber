        <!-- Top test cock #1 -->
        <rect x="62" y="40" width="6" height="12" rx="1" fill="url(#bf-brass)" stroke="rgba(245,158,11,.7)" stroke-width=".6"/>
        <rect x="60" y="35" width="10" height="6" rx="1" fill="rgba(245,158,11,.8)" stroke="rgba(245,158,11,.9)" stroke-width=".5"/>
        <line x1="59" y1="38" x2="71" y2="38" stroke="rgba(20,15,5,.4)" stroke-width=".8"/>
        <!-- Top test cock #2 -->
        <rect x="78" y="40" width="6" height="12" rx="1" fill="url(#bf-brass)" stroke="rgba(245,158,11,.7)" stroke-width=".6"/>
        <rect x="76" y="35" width="10" height="6" rx="1" fill="rgba(245,158,11,.8)" stroke="rgba(245,158,11,.9)" stroke-width=".5"/>
        <line x1="75" y1="38" x2="87" y2="38" stroke="rgba(20,15,5,.4)" stroke-width=".8"/>
        <!-- Top test cock #3 -->
        <rect x="92" y="40" width="6" height="12" rx="1" fill="url(#bf-brass)" stroke="rgba(245,158,11,.7)" stroke-width=".6"/>
        <rect x="90" y="35" width="10" height="6" rx="1" fill="rgba(245,158,11,.8)" stroke="rgba(245,158,11,.9)" stroke-width=".5"/>
        <line x1="89" y1="38" x2="101" y2="38" stroke="rgba(20,15,5,.4)" stroke-width=".8"/>
