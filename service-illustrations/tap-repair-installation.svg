<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="tap-brass" x1="40" y1="30" x2="110" y2="80" gradientUnits="userSpaceOnUse">
                <stop stop-color="#fbbf24"/><stop offset=".5" stop-color="#f59e0b"/><stop offset="1" stop-color="#92400e"/>
            </linearGradient>
            <linearGradient id="tap-shine" x1="0" y1="0" x2="0" y2="1">
                <stop stop-color="white" stop-opacity=".4"/><stop offset="1" stop-color="white" stop-opacity="0"/>
            </linearGradient>
        </defs>
        <!-- Wall background -->
        <rect x="20" y="20" width="20" height="80" fill="rgba(255,255,255,.04)"/>
        <line x1="40" y1="20" x2="40" y2="100" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
        <!-- Wall flange (mounting plate) -->
        <rect x="38" y="46" width="6" height="20" rx="1" fill="url(#tap-brass)" stroke="rgba(245,158,11,.5)" stroke-width=".6"/>
        <!-- Wall flange bolts -->
        <circle cx="41" cy="49" r=".8" fill="rgba(0,0,0,.5)"/>
        <circle cx="41" cy="63" r=".8" fill="rgba(0,0,0,.5)"/>
        <!-- Horizontal tap body -->
        <rect x="44" y="48" width="40" height="16" rx="2" fill="url(#tap-brass)" stroke="rgba(245,158,11,.6)" stroke-width=".8"/>
        <!-- Body shine -->
        <rect x="46" y="50" width="36" height="3" rx="1" fill="url(#tap-shine)"/>
        <!-- Handle block on top -->
        <rect x="58" y="35" width="12" height="13" rx="2" fill="url(#tap-brass)" stroke="rgba(245,158,11,.6)" stroke-width=".8"/>
        <!-- Handle top (wheel cap) -->
        <ellipse cx="64" cy="34" rx="9" ry="2" fill="url(#tap-brass)" stroke="rgba(245,158,11,.7)" stroke-width=".8"/>
        <!-- Handle cross-grip -->
        <line x1="56" y1="34" x2="72" y2="34" stroke="rgba(20,15,5,.4)" stroke-width="1"/>
        <line x1="64" y1="30" x2="64" y2="38" stroke="rgba(20,15,5,.4)" stroke-width="1"/>
        <!-- Spout descending and curving -->
        <path d="M84 56 L98 56 L98 78" stroke="url(#tap-brass)" stroke-width="6" fill="none" stroke-linecap="round"/>
        <!-- Spout shine -->
        <path d="M84 56 L98 56 L98 78" stroke="rgba(255,255,255,.3)" stroke-width="1.5" fill="none"/>
        <!-- Spout tip opening -->
        <ellipse cx="98" cy="79" rx="4" ry="1.5" fill="rgba(20,15,5,.7)" stroke="rgba(245,158,11,.6)" stroke-width=".5"/>
        <!-- Water drops dripping -->
        <path d="M98 82 C98 82 95 86 95 90 C95 92.5 96.5 94 98 94 C99.5 94 101 92.5 101 90 C101 86 98 82 98 82 Z" fill="#5a9aff" opacity=".85"/>
        <path d="M98 100 C98 100 96 103 96 105.5 C96 107 97 108 98 108 C99 108 100 107 100 105.5 C100 103 98 100 98 100 Z" fill="#5a9aff" opacity=".6"/>
        <!-- Splash ripple at bottom -->
        <ellipse cx="98" cy="112" rx="14" ry="2" fill="none" stroke="rgba(90,154,255,.3)" stroke-width=".7"/>
        <ellipse cx="98" cy="115" rx="20" ry="2.5" fill="none" stroke="rgba(90,154,255,.18)" stroke-width=".6"/>
    </svg>