<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="rp-roof" x1="80" y1="20" x2="80" y2="60" gradientUnits="userSpaceOnUse">
                <stop stop-color="#2a3a60"/><stop offset="1" stop-color="#1a2540"/>
            </linearGradient>
        </defs>
        <!-- Rain drops in background -->
        <path d="M30 10 L28 18" stroke="#5a9aff" stroke-width="1" opacity=".6"/>
        <path d="M45 15 L43 22" stroke="#5a9aff" stroke-width="1" opacity=".5"/>
        <path d="M125 8 L127 16" stroke="#5a9aff" stroke-width="1" opacity=".6"/>
        <path d="M140 14 L142 21" stroke="#5a9aff" stroke-width="1" opacity=".5"/>
        <path d="M115 18 L113 25" stroke="#5a9aff" stroke-width=".8" opacity=".4"/>
        <path d="M35 22 L33 29" stroke="#5a9aff" stroke-width=".8" opacity=".4"/>
        <!-- House roof (peak triangle) -->
        <path d="M80 20 L25 55 L135 55 Z" fill="url(#rp-roof)" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
        <!-- Roof tiles (horizontal stripes) -->
        <line x1="30" y1="50" x2="130" y2="50" stroke="rgba(255,255,255,.1)" stroke-width=".5"/>
        <line x1="35" y1="45" x2="125" y2="45" stroke="rgba(255,255,255,.1)" stroke-width=".5"/>
        <line x1="40" y1="40" x2="120" y2="40" stroke="rgba(255,255,255,.1)" stroke-width=".5"/>
        <line x1="45" y1="35" x2="115" y2="35" stroke="rgba(255,255,255,.1)" stroke-width=".5"/>
        <line x1="50" y1="30" x2="110" y2="30" stroke="rgba(255,255,255,.1)" stroke-width=".5"/>
        <!-- Gutter under roof eave -->
        <rect x="20" y="55" width="120" height="6" rx="1" fill="rgba(40,40,40,.7)" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
        <!-- Gutter inner shadow -->
        <rect x="20" y="55" width="120" height="3" fill="rgba(0,0,0,.4)"/>
        <!-- Water collecting in gutter -->
        <rect x="22" y="56" width="116" height="1.5" fill="rgba(90,154,255,.6)"/>
        <!-- Downpipe (vertical, on right side) -->
        <rect x="118" y="61" width="6" height="42" fill="rgba(40,40,40,.7)" stroke="rgba(255,255,255,.2)" stroke-width=".6"/>
        <!-- Downpipe bracket -->
        <rect x="116" y="75" width="10" height="2" rx=".5" fill="rgba(245,158,11,.4)"/>
        <rect x="116" y="92" width="10" height="2" rx=".5" fill="rgba(245,158,11,.4)"/>
        <!-- Downpipe elbow at bottom -->
        <path d="M118 103 L118 108 L108 108" stroke="rgba(40,40,40,.7)" stroke-width="6" fill="none" stroke-linecap="square"/>
        <!-- Water exiting downpipe -->
        <path d="M100 108 L95 113" stroke="#5a9aff" stroke-width="1.5" opacity=".7"/>
        <path d="M98 108 L93 115" stroke="#5a9aff" stroke-width="1" opacity=".5"/>
        <!-- Ground/grass line -->
        <line x1="15" y1="115" x2="145" y2="115" stroke="rgba(34,197,94,.2)" stroke-width=".8"/>
    </svg>