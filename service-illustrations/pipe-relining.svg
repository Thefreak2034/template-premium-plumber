<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="pl-old" x1="80" y1="20" x2="80" y2="100" gradientUnits="userSpaceOnUse">
                <stop stop-color="#92400e"/><stop offset="1" stop-color="#451a03"/>
            </linearGradient>
            <linearGradient id="pl-new" x1="80" y1="35" x2="80" y2="85" gradientUnits="userSpaceOnUse">
                <stop stop-color="white" stop-opacity=".9"/><stop offset="1" stop-color="#5a9aff" stop-opacity=".3"/>
            </linearGradient>
        </defs>
        <!-- Ground above pipe -->
        <rect x="10" y="10" width="140" height="22" fill="rgba(34,197,94,.15)" stroke="rgba(34,197,94,.25)" stroke-width=".5"/>
        <!-- Grass tufts -->
        <path d="M20 10 L20 14 M22 10 L22 14" stroke="rgba(34,197,94,.5)" stroke-width=".7"/>
        <path d="M55 10 L55 14 M57 10 L57 14" stroke="rgba(34,197,94,.5)" stroke-width=".7"/>
        <path d="M100 10 L100 14 M102 10 L102 14" stroke="rgba(34,197,94,.5)" stroke-width=".7"/>
        <path d="M130 10 L130 14 M132 10 L132 14" stroke="rgba(34,197,94,.5)" stroke-width=".7"/>
        <!-- Soil below grass -->
        <rect x="10" y="32" width="140" height="78" fill="rgba(120,53,15,.15)"/>
        <!-- Tree root system from above -->
        <path d="M30 32 Q35 45 40 55" stroke="rgba(120,53,15,.5)" stroke-width="1.5" fill="none"/>
        <path d="M70 32 Q72 48 70 60" stroke="rgba(120,53,15,.5)" stroke-width="1.5" fill="none"/>
        <path d="M110 32 Q108 45 105 58" stroke="rgba(120,53,15,.5)" stroke-width="1.5" fill="none"/>
        <!-- ─── Pipe cross-section (large, dominant) ─── -->
        <!-- Outer pipe wall (old, cracked terracotta) -->
        <circle cx="80" cy="68" r="30" fill="url(#pl-old)" stroke="rgba(120,53,15,.6)" stroke-width="1.2"/>
        <!-- Crack patterns on outer pipe -->
        <path d="M55 60 L60 65 L58 75 L65 80" stroke="rgba(0,0,0,.5)" stroke-width=".8" fill="none"/>
        <path d="M100 55 L105 62 L102 70 L107 78" stroke="rgba(0,0,0,.5)" stroke-width=".8" fill="none"/>
        <!-- Inner ring (where old liner used to be) -->
        <circle cx="80" cy="68" r="24" fill="rgba(20,15,10,.9)" stroke="rgba(255,255,255,.15)" stroke-width=".5"/>
        <!-- NEW LINER (smooth white epoxy resin) -->
        <circle cx="80" cy="68" r="20" fill="url(#pl-new)" stroke="rgba(255,255,255,.8)" stroke-width="1.5"/>
        <!-- Inner liner opening (the new smooth pipe interior) -->
        <circle cx="80" cy="68" r="16" fill="rgba(10,15,30,.95)"/>
        <!-- Highlight on new liner showing smoothness -->
        <path d="M67 60 Q72 55 80 56" stroke="white" stroke-width="1" fill="none" opacity=".6"/>
        <!-- Arrow showing direction of liner insertion -->
        <path d="M40 90 L60 80" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M55 78 L60 80 L58 85" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Label "NEW LINER" -->
        <text x="40" y="105" fill="#fbbf24" font-size="5" font-weight="bold">NEW LINER</text>
    </svg>