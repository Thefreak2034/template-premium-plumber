<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="wlb-pipe" x1="20" y1="55" x2="140" y2="65" gradientUnits="userSpaceOnUse">
                <stop stop-color="#1a2540"/><stop offset=".5" stop-color="#2a3a60"/><stop offset="1" stop-color="#1a2540"/>
            </linearGradient>
            <radialGradient id="wlb-leak-glow" cx="80" cy="75" r="20" gradientUnits="userSpaceOnUse">
                <stop stop-color="#5a9aff" stop-opacity=".5"/><stop offset="1" stop-color="#5a9aff" stop-opacity="0"/>
            </radialGradient>
        </defs>
        <!-- Detection sonar waves emanating from leak -->
        <circle cx="80" cy="75" r="36" fill="none" stroke="rgba(90,154,255,.1)" stroke-width=".8"/>
        <circle cx="80" cy="75" r="28" fill="none" stroke="rgba(90,154,255,.15)" stroke-width=".8"/>
        <circle cx="80" cy="75" r="20" fill="none" stroke="rgba(90,154,255,.2)" stroke-width=".8"/>
        <!-- Glow behind leak -->
        <ellipse cx="80" cy="75" rx="20" ry="15" fill="url(#wlb-leak-glow)"/>
        <!-- Horizontal pipe (substantial diameter) -->
        <rect x="15" y="45" width="130" height="20" rx="2" fill="url(#wlb-pipe)" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
        <!-- Pipe joint flanges (left + right) -->
        <rect x="13" y="40" width="6" height="30" rx="1" fill="rgba(20,28,50,.9)" stroke="rgba(255,255,255,.2)" stroke-width=".8"/>
        <rect x="141" y="40" width="6" height="30" rx="1" fill="rgba(20,28,50,.9)" stroke="rgba(255,255,255,.2)" stroke-width=".8"/>
        <!-- Bolts on flanges -->
        <circle cx="16" cy="46" r="1" fill="rgba(255,255,255,.4)"/>
        <circle cx="16" cy="64" r="1" fill="rgba(255,255,255,.4)"/>
        <circle cx="144" cy="46" r="1" fill="rgba(255,255,255,.4)"/>
        <circle cx="144" cy="64" r="1" fill="rgba(255,255,255,.4)"/>
        <!-- Pipe shine highlight -->
        <line x1="20" y1="50" x2="140" y2="50" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
        <!-- Crack on the pipe (jagged dark line) -->
        <path d="M72 47 L75 52 L72 57 L78 60 L74 64" stroke="rgba(245,158,11,.9)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <path d="M82 47 L79 52 L84 57 L80 62 L85 65" stroke="rgba(245,158,11,.7)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Water drops emerging from crack -->
        <path d="M78 68 C78 68 75 72 75 76 C75 79 77 81 78 81 C79 81 81 79 81 76 C81 72 78 68 78 68 Z" fill="#5a9aff" opacity=".85"/>
        <path d="M80 88 C80 88 78 91 78 94 C78 96 79 97 80 97 C81 97 82 96 82 94 C82 91 80 88 80 88 Z" fill="#5a9aff" opacity=".7"/>
        <path d="M81 103 C81 103 80 105 80 107 C80 108 80.5 109 81 109 C81.5 109 82 108 82 107 C82 105 81 103 81 103 Z" fill="#5a9aff" opacity=".5"/>
        <!-- Detection device on right side (sensor probe) -->
        <rect x="115" y="22" width="10" height="14" rx="1.5" fill="rgba(20,28,50,.9)" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
        <rect x="117" y="25" width="6" height="3" rx=".3" fill="#5a9aff" opacity=".7"/>
        <circle cx="120" cy="33" r=".8" fill="#22c55e"/>
        <!-- Detection cable curving down to leak -->
        <path d="M120 36 C120 50 90 60 80 70" stroke="rgba(255,255,255,.18)" stroke-width="1" fill="none" stroke-dasharray="2 1.5"/>
    </svg>