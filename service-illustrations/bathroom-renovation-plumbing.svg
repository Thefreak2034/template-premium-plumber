<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="br-tub" x1="30" y1="50" x2="130" y2="100" gradientUnits="userSpaceOnUse">
                <stop stop-color="white" stop-opacity=".95"/><stop offset="1" stop-color="white" stop-opacity=".7"/>
            </linearGradient>
            <linearGradient id="br-water" x1="50" y1="65" x2="110" y2="80" gradientUnits="userSpaceOnUse">
                <stop stop-color="#5a9aff" stop-opacity=".7"/><stop offset="1" stop-color="#1646D2" stop-opacity=".4"/>
            </linearGradient>
        </defs>
        <!-- Tile background subtle -->
        <rect x="10" y="10" width="140" height="60" fill="rgba(20,28,50,.3)"/>
        <line x1="40" y1="10" x2="40" y2="70" stroke="rgba(255,255,255,.06)" stroke-width=".3"/>
        <line x1="80" y1="10" x2="80" y2="70" stroke="rgba(255,255,255,.06)" stroke-width=".3"/>
        <line x1="120" y1="10" x2="120" y2="70" stroke="rgba(255,255,255,.06)" stroke-width=".3"/>
        <line x1="10" y1="40" x2="150" y2="40" stroke="rgba(255,255,255,.06)" stroke-width=".3"/>
        <!-- Wall-mounted tap (brass, with curved spout over tub) -->
        <rect x="74" y="25" width="12" height="6" rx="1" fill="rgba(245,158,11,.7)" stroke="rgba(245,158,11,.9)" stroke-width=".5"/>
        <path d="M80 31 Q80 45 88 50" stroke="rgba(245,158,11,.7)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Water pouring from tap -->
        <path d="M88 50 L88 60" stroke="#5a9aff" stroke-width="1.5" opacity=".8"/>
        <path d="M89 50 L89 58" stroke="#5a9aff" stroke-width=".8" opacity=".5"/>
        <!-- ─── Freestanding bathtub ─── -->
        <!-- Outer tub shape -->
        <path d="M28 75 Q28 65 38 65 L122 65 Q132 65, 132 75 L132 95 Q132 102, 122 102 L38 102 Q28 102, 28 95 Z" fill="url(#br-tub)" stroke="rgba(255,255,255,.5)" stroke-width="1.5"/>
        <!-- Inner tub depth -->
        <ellipse cx="80" cy="80" rx="46" ry="10" fill="rgba(20,28,50,.3)"/>
        <!-- Water in tub -->
        <ellipse cx="80" cy="82" rx="44" ry="8" fill="url(#br-water)"/>
        <!-- Water ripples -->
        <ellipse cx="88" cy="78" rx="14" ry="2" fill="none" stroke="rgba(255,255,255,.4)" stroke-width=".5"/>
        <ellipse cx="88" cy="82" rx="18" ry="2.5" fill="none" stroke="rgba(255,255,255,.2)" stroke-width=".5"/>
        <!-- Drain (with chain) -->
        <circle cx="80" cy="82" r="2" fill="rgba(245,158,11,.7)" stroke="rgba(245,158,11,.9)" stroke-width=".5"/>
        <!-- Feet (claw-foot style) -->
        <ellipse cx="38" cy="105" rx="4" ry="3" fill="rgba(245,158,11,.6)"/>
        <ellipse cx="122" cy="105" rx="4" ry="3" fill="rgba(245,158,11,.6)"/>
        <!-- Floor tile line -->
        <line x1="10" y1="115" x2="150" y2="115" stroke="rgba(255,255,255,.08)" stroke-width=".5"/>
    </svg>