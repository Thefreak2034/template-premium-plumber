<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="t-porcelain" x1="0" y1="20" x2="0" y2="100" gradientUnits="userSpaceOnUse">
                <stop stop-color="white" stop-opacity=".95"/><stop offset="1" stop-color="white" stop-opacity=".7"/>
            </linearGradient>
        </defs>
        <!-- Wall background -->
        <line x1="50" y1="10" x2="50" y2="105" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
        <rect x="10" y="10" width="40" height="95" fill="rgba(20,28,50,.3)"/>
        <!-- Floor line -->
        <line x1="10" y1="105" x2="150" y2="105" stroke="rgba(255,255,255,.2)" stroke-width="1"/>

        <!-- ─── CISTERN (tall tank, top, sits behind/above the seat) ─── -->
        <!-- Cistern body — tall rectangle, top-back of toilet -->
        <path d="M52 25 L92 25 L92 60 L52 60 Z" fill="url(#t-porcelain)" stroke="rgba(255,255,255,.6)" stroke-width="1.5"/>
        <!-- Cistern lid line (top edge highlight) -->
        <line x1="52" y1="28" x2="92" y2="28" stroke="rgba(255,255,255,.5)" stroke-width=".8"/>
        <!-- Flush button on top of cistern -->
        <rect x="68" y="22" width="8" height="3" rx=".5" fill="rgba(245,158,11,.7)" stroke="rgba(245,158,11,.9)" stroke-width=".5"/>

        <!-- ─── SEAT + LID (raised up at an angle behind the bowl, classic open-lid look) ─── -->
        <!-- Lid (raised, angled back) -->
        <path d="M88 60 L138 50 L138 53 L88 63 Z" fill="rgba(255,255,255,.8)" stroke="rgba(255,255,255,.5)" stroke-width="1"/>
        <!-- Seat ring (sitting flat on bowl rim) -->
        <path d="M88 63 L138 63 L138 67 L88 67 Z" fill="rgba(255,255,255,.85)" stroke="rgba(255,255,255,.5)" stroke-width="1"/>

        <!-- ─── BOWL (classic side-profile shape — wide rim narrowing down to base) ─── -->
        <!-- Bowl side silhouette (top opening rim, sloping sides down to base) -->
        <path d="M88 67 L138 67 L132 95 L94 95 Z" fill="url(#t-porcelain)" stroke="rgba(255,255,255,.6)" stroke-width="1.5"/>
        <!-- Bowl inner rim shadow (showing it's hollow) -->
        <path d="M90 67 L136 67 L135 73 L91 73 Z" fill="rgba(20,28,50,.4)"/>
        <!-- Water visible in bowl interior -->
        <ellipse cx="113" cy="78" rx="18" ry="3" fill="rgba(90,154,255,.6)"/>
        <ellipse cx="108" cy="77" rx="5" ry="1" fill="rgba(255,255,255,.4)"/>

        <!-- ─── PEDESTAL BASE (wide where bowl meets floor) ─── -->
        <path d="M94 95 L132 95 L130 105 L96 105 Z" fill="url(#t-porcelain)" stroke="rgba(255,255,255,.6)" stroke-width="1.5"/>
        <!-- Base floor shadow -->
        <ellipse cx="113" cy="106" rx="22" ry="1.5" fill="rgba(0,0,0,.4)"/>

        <!-- ─── CISTERN-TO-BOWL CONNECTION PIPE (visible behind seat) ─── -->
        <rect x="80" y="60" width="6" height="6" fill="rgba(200,200,200,.5)" stroke="rgba(255,255,255,.4)" stroke-width=".5"/>

        <!-- ─── WATER SUPPLY (from wall to cistern bottom-back) ─── -->
        <path d="M50 56 L52 56" stroke="rgba(200,200,200,.7)" stroke-width="2.5" stroke-linecap="round"/>
        <rect x="44" y="53" width="6" height="6" rx="1" fill="rgba(245,158,11,.6)" stroke="rgba(245,158,11,.9)" stroke-width=".5"/>
        <circle cx="47" cy="56" r="1" fill="rgba(245,158,11,.9)"/>

        <!-- ─── TOILET PAPER HOLDER on wall (small detail to add context) ─── -->
        <line x1="35" y1="80" x2="35" y2="86" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>
        <circle cx="35" cy="88" r="3" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
        <circle cx="35" cy="88" r="1" fill="rgba(255,255,255,.4)"/>
    </svg>