<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="rt-tank" x1="55" y1="25" x2="105" y2="105" gradientUnits="userSpaceOnUse">
                <stop stop-color="#2a3a60"/><stop offset="1" stop-color="#1a2540"/>
            </linearGradient>
            <linearGradient id="rt-water-level" x1="80" y1="55" x2="80" y2="100" gradientUnits="userSpaceOnUse">
                <stop stop-color="#5a9aff" stop-opacity=".5"/><stop offset="1" stop-color="#1646D2" stop-opacity=".7"/>
            </linearGradient>
        </defs>
        <!-- Rain falling -->
        <path d="M20 5 L18 13" stroke="#5a9aff" stroke-width="1" opacity=".7"/>
        <path d="M35 8 L33 16" stroke="#5a9aff" stroke-width="1" opacity=".6"/>
        <path d="M50 5 L48 13" stroke="#5a9aff" stroke-width="1" opacity=".7"/>
        <path d="M60 12 L58 20" stroke="#5a9aff" stroke-width=".8" opacity=".5"/>
        <path d="M120 5 L122 13" stroke="#5a9aff" stroke-width="1" opacity=".7"/>
        <path d="M135 8 L137 16" stroke="#5a9aff" stroke-width="1" opacity=".6"/>
        <path d="M145 4 L147 12" stroke="#5a9aff" stroke-width=".8" opacity=".5"/>
        <!-- House edge on left -->
        <rect x="10" y="20" width="22" height="80" fill="rgba(40,40,40,.6)" stroke="rgba(255,255,255,.15)" stroke-width=".5"/>
        <!-- Gutter on house edge -->
        <rect x="10" y="22" width="22" height="4" rx="1" fill="rgba(40,40,40,.8)"/>
        <!-- Downpipe descending from gutter, curving to tank top -->
        <path d="M28 26 L28 45 L48 45 L48 32" stroke="#92400e" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M28 26 L28 45 L48 45 L48 32" stroke="rgba(245,158,11,.6)" stroke-width="2" fill="none"/>
        <!-- ─── Slimline rectangular tank (tall, dominant) ─── -->
        <!-- Tank body -->
        <rect x="55" y="32" width="50" height="75" rx="3" fill="url(#rt-tank)" stroke="rgba(255,255,255,.25)" stroke-width="1"/>
        <!-- Tank top edge (rounded corners) -->
        <ellipse cx="80" cy="32" rx="25" ry="3" fill="rgba(40,50,80,.6)" stroke="rgba(255,255,255,.2)" stroke-width=".5"/>
        <!-- Inlet pipe entering top -->
        <rect x="46" y="29" width="12" height="6" rx="1" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.2)" stroke-width=".5"/>
        <!-- Tank ribs (slimline tanks have horizontal ribs for strength) -->
        <line x1="55" y1="45" x2="105" y2="45" stroke="rgba(255,255,255,.1)" stroke-width=".5"/>
        <line x1="55" y1="55" x2="105" y2="55" stroke="rgba(255,255,255,.1)" stroke-width=".5"/>
        <line x1="55" y1="65" x2="105" y2="65" stroke="rgba(255,255,255,.1)" stroke-width=".5"/>
        <line x1="55" y1="75" x2="105" y2="75" stroke="rgba(255,255,255,.1)" stroke-width=".5"/>
        <line x1="55" y1="85" x2="105" y2="85" stroke="rgba(255,255,255,.1)" stroke-width=".5"/>
        <line x1="55" y1="95" x2="105" y2="95" stroke="rgba(255,255,255,.1)" stroke-width=".5"/>
        <!-- Water level indicator (visible through opening) -->
        <rect x="60" y="55" width="5" height="50" fill="rgba(10,15,30,.5)"/>
        <rect x="60" y="65" width="5" height="40" fill="url(#rt-water-level)"/>
        <!-- Tank shine -->
        <rect x="58" y="35" width="3" height="60" fill="rgba(255,255,255,.1)"/>
        <!-- Outlet tap at bottom -->
        <rect x="105" y="92" width="10" height="4" rx="1" fill="rgba(245,158,11,.6)" stroke="rgba(245,158,11,.8)" stroke-width=".5"/>
        <circle cx="118" cy="94" r="2" fill="rgba(245,158,11,.7)" stroke="rgba(245,158,11,.9)" stroke-width=".5"/>
        <!-- Tank base/plinth -->
        <rect x="55" y="105" width="50" height="6" rx="1" fill="rgba(40,40,40,.7)" stroke="rgba(255,255,255,.15)" stroke-width=".5"/>
        <!-- Pump unit beside tank -->
        <rect x="115" y="98" width="14" height="10" rx="1" fill="rgba(40,40,40,.8)" stroke="rgba(255,255,255,.2)" stroke-width=".5"/>
        <circle cx="122" cy="103" r="2" fill="rgba(90,154,255,.4)" stroke="rgba(90,154,255,.7)" stroke-width=".5"/>
        <!-- Ground line -->
        <line x1="5" y1="115" x2="150" y2="115" stroke="rgba(34,197,94,.2)" stroke-width=".8"/>
    </svg>