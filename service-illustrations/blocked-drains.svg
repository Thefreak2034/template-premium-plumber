<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="bd-flow" x1="80" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
                <stop stop-color="#5a9aff" stop-opacity=".4"/><stop offset="1" stop-color="#1646D2" stop-opacity=".1"/>
            </linearGradient>
            <radialGradient id="bd-grate-shadow" cx="80" cy="80" r="35" gradientUnits="userSpaceOnUse">
                <stop stop-color="#0F3399" stop-opacity=".4"/><stop offset="1" stop-color="#0F3399" stop-opacity="0"/>
            </radialGradient>
        </defs>
        <!-- Water stream flowing down from top -->
        <path d="M65 5 L70 50 L90 50 L95 5 Z" fill="url(#bd-flow)" opacity=".5"/>
        <!-- Water drops dripping mid-flow -->
        <circle cx="72" cy="20" r="1.5" fill="#5a9aff" opacity=".6"/>
        <circle cx="86" cy="30" r="2" fill="#5a9aff" opacity=".5"/>
        <circle cx="76" cy="38" r="1.2" fill="#5a9aff" opacity=".4"/>
        <!-- Drain shadow underneath -->
        <ellipse cx="80" cy="85" rx="40" ry="6" fill="url(#bd-grate-shadow)"/>
        <!-- Drain bowl rim (perspective) -->
        <ellipse cx="80" cy="65" rx="32" ry="10" fill="rgba(20,28,50,.95)" stroke="rgba(255,255,255,.18)" stroke-width="1"/>
        <!-- Inner rim depth -->
        <ellipse cx="80" cy="68" rx="28" ry="7" fill="rgba(10,15,30,.8)"/>
        <!-- Grate slats (parallel bars across the drain) -->
        <line x1="56" y1="65" x2="56" y2="71" stroke="rgba(255,255,255,.4)" stroke-width="2.5"/>
        <line x1="62" y1="64" x2="62" y2="72" stroke="rgba(255,255,255,.5)" stroke-width="2.5"/>
        <line x1="68" y1="63" x2="68" y2="73" stroke="rgba(255,255,255,.55)" stroke-width="2.5"/>
        <line x1="74" y1="63" x2="74" y2="73" stroke="rgba(255,255,255,.6)" stroke-width="2.5"/>
        <line x1="80" y1="63" x2="80" y2="73" stroke="rgba(255,255,255,.6)" stroke-width="2.5"/>
        <line x1="86" y1="63" x2="86" y2="73" stroke="rgba(255,255,255,.6)" stroke-width="2.5"/>
        <line x1="92" y1="63" x2="92" y2="73" stroke="rgba(255,255,255,.55)" stroke-width="2.5"/>
        <line x1="98" y1="64" x2="98" y2="72" stroke="rgba(255,255,255,.5)" stroke-width="2.5"/>
        <line x1="104" y1="65" x2="104" y2="71" stroke="rgba(255,255,255,.4)" stroke-width="2.5"/>
        <!-- Bubble around drain showing blockage / overflow -->
        <circle cx="55" cy="80" r="3" fill="none" stroke="rgba(22,70,210,.3)" stroke-width="1"/>
        <circle cx="106" cy="78" r="2" fill="none" stroke="rgba(22,70,210,.25)" stroke-width="1"/>
        <circle cx="60" cy="92" r="2.5" fill="none" stroke="rgba(22,70,210,.2)" stroke-width=".8"/>
        <circle cx="100" cy="94" r="3" fill="none" stroke="rgba(22,70,210,.18)" stroke-width=".8"/>
        <!-- Floor surface line -->
        <line x1="30" y1="75" x2="130" y2="75" stroke="rgba(255,255,255,.08)" stroke-width=".5"/>
    </svg>