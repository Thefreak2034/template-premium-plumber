<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="ap-front" x1="45" y1="20" x2="115" y2="100" gradientUnits="userSpaceOnUse">
                <stop stop-color="#2a3a60"/><stop offset="1" stop-color="#1a2540"/>
            </linearGradient>
        </defs>
        <!-- Cabinet space outline -->
        <rect x="35" y="15" width="90" height="90" rx="2" fill="rgba(20,28,50,.4)" stroke="rgba(255,255,255,.1)" stroke-width=".7"/>
        <!-- Dishwasher body (integrated panel front) -->
        <rect x="40" y="20" width="80" height="80" rx="2" fill="url(#ap-front)" stroke="rgba(255,255,255,.2)" stroke-width="1.2"/>
        <!-- Top control strip -->
        <rect x="40" y="20" width="80" height="6" rx="1" fill="rgba(20,28,50,.95)" stroke="rgba(255,255,255,.15)" stroke-width=".5"/>
        <!-- Control lights -->
        <circle cx="50" cy="23" r="1" fill="#22c55e"/>
        <circle cx="56" cy="23" r="1" fill="#5a9aff"/>
        <circle cx="62" cy="23" r="1" fill="rgba(255,255,255,.3)"/>
        <!-- Digital display -->
        <rect x="100" y="22" width="15" height="3" rx=".3" fill="rgba(10,15,30,.9)"/>
        <text x="107" y="24" fill="#5a9aff" font-size="2.5" font-family="monospace" text-anchor="middle">2:34</text>
        <!-- Handle (recessed) -->
        <rect x="60" y="55" width="40" height="3" rx="1" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.2)" stroke-width=".5"/>
        <!-- Panel inset (subtle) -->
        <rect x="45" y="30" width="70" height="65" rx="1" fill="none" stroke="rgba(255,255,255,.05)" stroke-width=".5"/>
        <!-- Logo/badge (centered, very subtle) -->
        <circle cx="80" cy="80" r="3" fill="none" stroke="rgba(255,255,255,.15)" stroke-width=".5"/>
        <!-- ─── Plumbing connections visible behind/below ─── -->
        <!-- Water supply line (blue, curving from wall) -->
        <path d="M120 100 C120 110, 100 110, 100 102" stroke="#5a9aff" stroke-width="2" fill="none" stroke-linecap="round" opacity=".8"/>
        <!-- Cold-water tap valve -->
        <circle cx="120" cy="100" r="3" fill="rgba(90,154,255,.3)" stroke="#5a9aff" stroke-width="1"/>
        <!-- Waste hose (charcoal) curving down -->
        <path d="M40 100 C30 105, 30 112, 25 112" stroke="rgba(40,40,40,.8)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Waste fitting -->
        <rect x="22" y="110" width="6" height="4" rx="1" fill="rgba(20,28,50,.9)" stroke="rgba(255,255,255,.2)" stroke-width=".5"/>
        <!-- Floor line -->
        <line x1="15" y1="105" x2="145" y2="105" stroke="rgba(255,255,255,.06)" stroke-width=".5"/>
    </svg>