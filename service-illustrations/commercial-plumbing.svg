<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="cp-building" x1="40" y1="10" x2="120" y2="110" gradientUnits="userSpaceOnUse">
                <stop stop-color="#1a2540"/><stop offset="1" stop-color="#0e1220"/>
            </linearGradient>
        </defs>
        <!-- Building outline -->
        <rect x="35" y="15" width="90" height="90" rx="1" fill="url(#cp-building)" stroke="rgba(255,255,255,.25)" stroke-width="1.2"/>
        <!-- Building roof line -->
        <line x1="35" y1="20" x2="125" y2="20" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
        <!-- Floor divisions -->
        <line x1="35" y1="35" x2="125" y2="35" stroke="rgba(255,255,255,.15)" stroke-width=".6"/>
        <line x1="35" y1="55" x2="125" y2="55" stroke="rgba(255,255,255,.15)" stroke-width=".6"/>
        <line x1="35" y1="75" x2="125" y2="75" stroke="rgba(255,255,255,.15)" stroke-width=".6"/>
        <line x1="35" y1="95" x2="125" y2="95" stroke="rgba(255,255,255,.15)" stroke-width=".6"/>
        <!-- Windows on left side (lit floors) -->
        <rect x="42" y="24" width="8" height="6" rx=".5" fill="rgba(90,154,255,.3)" stroke="rgba(90,154,255,.5)" stroke-width=".4"/>
        <rect x="42" y="42" width="8" height="6" rx=".5" fill="rgba(90,154,255,.25)" stroke="rgba(90,154,255,.5)" stroke-width=".4"/>
        <rect x="42" y="62" width="8" height="6" rx=".5" fill="rgba(90,154,255,.3)" stroke="rgba(90,154,255,.5)" stroke-width=".4"/>
        <rect x="42" y="82" width="8" height="6" rx=".5" fill="rgba(90,154,255,.2)" stroke="rgba(90,154,255,.5)" stroke-width=".4"/>
        <!-- Windows on right side -->
        <rect x="110" y="24" width="8" height="6" rx=".5" fill="rgba(90,154,255,.25)" stroke="rgba(90,154,255,.5)" stroke-width=".4"/>
        <rect x="110" y="42" width="8" height="6" rx=".5" fill="rgba(90,154,255,.3)" stroke="rgba(90,154,255,.5)" stroke-width=".4"/>
        <rect x="110" y="62" width="8" height="6" rx=".5" fill="rgba(90,154,255,.25)" stroke="rgba(90,154,255,.5)" stroke-width=".4"/>
        <rect x="110" y="82" width="8" height="6" rx=".5" fill="rgba(90,154,255,.2)" stroke="rgba(90,154,255,.5)" stroke-width=".4"/>
        <!-- ─── Central pipe column (vertical, dominant visual element) ─── -->
        <!-- Pipe behind building (suggesting through-floors plumbing) -->
        <rect x="76" y="20" width="8" height="85" fill="rgba(245,158,11,.4)" stroke="rgba(245,158,11,.7)" stroke-width="1"/>
        <!-- Pipe shine -->
        <line x1="77" y1="22" x2="77" y2="103" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
        <!-- Pipe joints/couplings at each floor -->
        <rect x="74" y="33" width="12" height="4" rx=".5" fill="rgba(245,158,11,.6)" stroke="rgba(245,158,11,.9)" stroke-width=".5"/>
        <rect x="74" y="53" width="12" height="4" rx=".5" fill="rgba(245,158,11,.6)" stroke="rgba(245,158,11,.9)" stroke-width=".5"/>
        <rect x="74" y="73" width="12" height="4" rx=".5" fill="rgba(245,158,11,.6)" stroke="rgba(245,158,11,.9)" stroke-width=".5"/>
        <rect x="74" y="93" width="12" height="4" rx=".5" fill="rgba(245,158,11,.6)" stroke="rgba(245,158,11,.9)" stroke-width=".5"/>
        <!-- Branch pipes to floors (going to windows) -->
        <line x1="76" y1="30" x2="50" y2="30" stroke="rgba(245,158,11,.4)" stroke-width="2"/>
        <line x1="84" y1="30" x2="110" y2="30" stroke="rgba(245,158,11,.4)" stroke-width="2"/>
        <line x1="76" y1="50" x2="50" y2="50" stroke="rgba(245,158,11,.4)" stroke-width="2"/>
        <line x1="84" y1="50" x2="110" y2="50" stroke="rgba(245,158,11,.4)" stroke-width="2"/>
        <line x1="76" y1="70" x2="50" y2="70" stroke="rgba(245,158,11,.4)" stroke-width="2"/>
        <line x1="84" y1="70" x2="110" y2="70" stroke="rgba(245,158,11,.4)" stroke-width="2"/>
        <line x1="76" y1="90" x2="50" y2="90" stroke="rgba(245,158,11,.4)" stroke-width="2"/>
        <line x1="84" y1="90" x2="110" y2="90" stroke="rgba(245,158,11,.4)" stroke-width="2"/>
        <!-- Entrance doors at ground -->
        <rect x="73" y="98" width="14" height="7" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.3)" stroke-width=".5"/>
        <!-- "Commercial" label visual cue -->
        <text x="80" y="18" fill="rgba(255,255,255,.6)" font-size="6" font-weight="bold" text-anchor="middle">⌂ ⌂ ⌂</text>
    </svg>